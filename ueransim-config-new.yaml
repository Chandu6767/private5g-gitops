apiVersion: v1
kind: ConfigMap
metadata:
  name: ueransim-config
  namespace: open5gs
data:
  open5gs-gnb.yaml: |
    mcc: '901'
    mnc: '70'

    nci: '0x000000010'
    idLength: 32
    tac: 1

    linkIp: 0.0.0.0
    ngapIp: 0.0.0.0
    gtpIp: 0.0.0.0

    ignoreStreamIds: true

    amfConfigs:
      - address: amf
        port: 38412

    slices:
      - sst: 1

  open5gs-ue.yaml: |
    supi: 'imsi-901700000000001'

    mcc: '901'
    mnc: '70'

    key: '465B5CE8B199B49FAA5F0A2EE238A6BC'
    op: 'E8ED289DEBA952E4283B54E88E6183CA'
    opType: 'OPC'

    amf: '8000'
    imei: '356938035643803'

    gnbSearchList:
      - gnb

    integrity:
      IA1: true
      IA2: true
      IA3: true

    ciphering:
      EA1: true
      EA2: true
      EA3: true

    integrityMaxRate:
      uplink: full
      downlink: full

    uacAic:
      mps: false
      mcs: false

    sessions:
      - type: IPv4
        apn: internet
        slice:
          sst: 1
