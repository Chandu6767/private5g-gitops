apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: open5gs
  labels:
    app: amf

spec:
  replicas: 1

  selector:
    matchLabels:
      app: amf

  template:
    metadata:
      labels:
        app: amf

    spec:
      containers:
      - name: amf
        image: openverso/open5gs:latest
        imagePullPolicy: IfNotPresent

        command:
        - open5gs-amfd
