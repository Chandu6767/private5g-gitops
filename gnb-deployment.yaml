apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnb
  namespace: open5gs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gnb
  template:
    metadata:
      labels:
        app: gnb
    spec:
      containers:
      - name: gnb
        image: free5gc/ueransim:latest
        command:
          - nr-gnb
          - -c
          - /UERANSIM/config/open5gs-gnb.yaml
